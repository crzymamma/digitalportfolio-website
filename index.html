    <script>
        // Set a flag
        let isNavigatingAway = false;

        // Page Transition
        document.addEventListener('DOMContentLoaded', function() {
            // If we're coming from back/forward navigation, skip animations
            if (sessionStorage.getItem('isBackNavigation') === 'true') {
                document.body.style.animation = 'none';
                document.body.style.opacity = '1';
                document.body.style.filter = 'blur(0)';
                sessionStorage.removeItem('isBackNavigation');
            }
            
            const allLinks = document.querySelectorAll('a[href]');
            
            allLinks.forEach(link => {
                // Skip external links, anchors, emails, and phones
                if (link.getAttribute('href').startsWith('#') || 
                    link.getAttribute('href').startsWith('http') ||
                    link.getAttribute('href').startsWith('mailto:') ||
                    link.getAttribute('href').startsWith('tel:')) {
                    return;
                }
                
                // Get current page filename
                const currentPage = window.location.pathname.split('/').pop() || 'index.html';
                const linkPage = link.getAttribute('href');
                
                // Apply transition only to internal HTML page links
                if (linkPage !== currentPage && 
                    (linkPage.endsWith('.html') || linkPage === '/' || linkPage === '')) {
                    
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetUrl = this.getAttribute('href');
                        isNavigatingAway = true;
                        
                        // Add fade-out animation classes
                        document.body.classList.add('fade-out', 'animating');
                        
                        // Navigate after animation completes
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 200); // Match CSS animation duration of .2s
                    });
                }
            });
        });

        // Detect back/forward navigation
        window.addEventListener('beforeunload', function() {
            if (!isNavigatingAway) {
                sessionStorage.setItem('isBackNavigation', 'true');
            }
        });

        // Reset flag after page loads
        window.addEventListener('pageshow', function(event) {
            isNavigatingAway = false;
            if (event.persisted) {
                document.body.classList.remove('fade-out', 'animating');
            }
        });
    </script>

    <script>
        // Carousel
        document.addEventListener('DOMContentLoaded', function() {
            const track = document.querySelector('.carousel-track');
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.dot');
            let currentIndex = 0;
            const slideCount = slides.length;
            
            // Drag variables
            let isDragging = false;
            let startPos = 0;
            let currentTranslate = 0;
            let prevTranslate = 0;
            let animationID = 0;
            let dragStartTime = 0;
            
            // Disable transition while dragging
            slides.forEach(slide => {
                slide.classList.remove('active', 'visible-title');
            });
            
            function getPositionX(event) {
                return event.type.includes('mouse') ? event.pageX : event.touches[0].clientX;
            }
            
            function setSliderPosition() {
                track.style.transform = `translateX(${currentTranslate}px)`;
            }
            
            function animation() {
                setSliderPosition();
                if (isDragging) requestAnimationFrame(animation);
            }
            
            function updateSlideAndDots() {
                const slideWidth = slides[0].getBoundingClientRect().width;
                const nearestIndex = Math.round(-currentTranslate / slideWidth);
                
                // Constrain to valid range
                currentIndex = Math.min(Math.max(nearestIndex, 0), slideCount - 1);
                
                // Update title visibility
                slides.forEach(slide => {
                    slide.classList.remove('visible-title');
                });
                slides[currentIndex].classList.add('visible-title');
                
                // Update dots
                dots.forEach((dot, i) => {
                    if (i === currentIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
                
                // Snap to slide
                prevTranslate = -currentIndex * slideWidth;
                currentTranslate = prevTranslate;
                setSliderPosition();
            }
            
            // Mouse/Touch Events
            track.addEventListener('mousedown', dragStart);
            track.addEventListener('touchstart', dragStart);
            track.addEventListener('mouseup', dragEnd);
            track.addEventListener('touchend', dragEnd);
            track.addEventListener('mouseleave', dragEnd);
            track.addEventListener('mousemove', drag);
            track.addEventListener('touchmove', drag, { passive: false });
            
            // Prevent default drag behavior on images
            track.addEventListener('dragstart', (e) => e.preventDefault());
            
            function dragStart(e) {
                isDragging = true;
                dragStartTime = Date.now();
                startPos = getPositionX(e);
                
                // Cancel any ongoing transitions
                track.style.transition = 'none';

                // Calculate current translate if not set
                if (!prevTranslate) {
                    const slideWidth = slides[0].getBoundingClientRect().width;
                    prevTranslate = -currentIndex * slideWidth;
                    currentTranslate = prevTranslate;
                }
                
                animationID = requestAnimationFrame(animation);
            }
            
            function drag(e) {
                if (!isDragging) return;
                
                const currentPosition = getPositionX(e);
                const slideWidth = slides[0].getBoundingClientRect().width;
                const dragDelta = Math.abs(currentPosition - startPos);

                // Only prevent scroll/default once we're sure it's a horizontal drag
                if (dragDelta > 8) {
                    e.preventDefault();
                }
                
                // Calculate new position with boundaries
                let newTranslate = prevTranslate + (currentPosition - startPos);
                
                // Add resistance at edges (optional - makes dragging feel better)
                const minTranslate = -(slideCount - 1) * slideWidth - 50;
                const maxTranslate = 50;
                
                if (newTranslate < minTranslate) {
                    newTranslate = minTranslate + (newTranslate - minTranslate) * 0.2;
                } else if (newTranslate > maxTranslate) {
                    newTranslate = maxTranslate + (newTranslate - maxTranslate) * 0.2;
                }
                
                currentTranslate = newTranslate;
            }
            
            function dragEnd(e) {
                if (!isDragging) return;
                
                isDragging = false;
                cancelAnimationFrame(animationID);
                
                const dragDuration = Date.now() - dragStartTime;
                const slideWidth = slides[0].getBoundingClientRect().width;
                const dragDistance = Math.abs(currentTranslate - prevTranslate);
                
                // Flag as a drag so slide-link clicks are suppressed
                if (dragDistance > 5) {
                    track.dataset.wasDragging = 'true';
                    setTimeout(() => { delete track.dataset.wasDragging; }, 50);
                }
                
                // Determine if this was a quick flick (fast drag)
                if (dragDuration < 300 && Math.abs(currentTranslate - prevTranslate) > 30) {
                    // Flick navigation
                    if (currentTranslate < prevTranslate - 30) {
                        // Dragged left - go to next
                        currentIndex = Math.min(currentIndex + 1, slideCount - 1);
                    } else if (currentTranslate > prevTranslate + 30) {
                        // Dragged right - go to previous
                        currentIndex = Math.max(currentIndex - 1, 0);
                    }
                } else {
                    // Normal drag - snap based on position
                    const dragDelta = currentTranslate - prevTranslate;
                    if (Math.abs(dragDelta) > slideWidth * 0.2) {
                        if (dragDelta < 0 && currentIndex < slideCount - 1) {
                            currentIndex++;
                        } else if (dragDelta > 0 && currentIndex > 0) {
                            currentIndex--;
                        }
                    }
                }
                
                // Snap to slide with animation
                track.style.transition = 'transform 0.3s ease-out';
                prevTranslate = -currentIndex * slideWidth;
                currentTranslate = prevTranslate;
                setSliderPosition();
                
                // Update UI
                slides.forEach(slide => {
                    slide.classList.remove('visible-title');
                });
                slides[currentIndex].classList.add('visible-title');
                
                dots.forEach((dot, i) => {
                    if (i === currentIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
                
                setTimeout(() => {
                    track.style.transition = 'transform 0.5s ease-in-out';
                }, 300);

                updateRestartButton();
            }
            
            // Click on non-active slides to navigate to them
            slides.forEach((slide, index) => {
                slide.addEventListener('click', function(e) {
                    if (index === currentIndex) return;
                    if (track.dataset.wasDragging) return;
                    e.preventDefault();
                    e.stopPropagation();

                    currentIndex = index;
                    const slideWidth = slides[0].getBoundingClientRect().width;
                    prevTranslate = -currentIndex * slideWidth;
                    currentTranslate = prevTranslate;
                    track.style.transform = `translateX(${currentTranslate}px)`;

                    slides.forEach(s => s.classList.remove('visible-title'));
                    slides[currentIndex].classList.add('visible-title');

                    dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
                    updateRestartButton();
                }, true);
            });

            // Restart button
            const restartBtn = document.getElementById('carouselRestart');

            function updateRestartButton() {
                restartBtn.classList.toggle('visible', currentIndex > 0);
            }

            restartBtn.addEventListener('click', function() {
                currentIndex = 0;
                const slideWidth = slides[0].getBoundingClientRect().width;
                prevTranslate = -currentIndex * slideWidth;
                currentTranslate = prevTranslate;
                track.style.transform = `translateX(${currentTranslate}px)`;

                slides.forEach(s => s.classList.remove('visible-title'));
                slides[0].classList.add('visible-title');

                dots.forEach((dot, i) => dot.classList.toggle('active', i === 0));
                updateRestartButton();
            });
            
            // Dot navigation
            dots.forEach((dot, index) => {
                dot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    currentIndex = index;
                    
                    const slideWidth = slides[0].getBoundingClientRect().width;
                    prevTranslate = -currentIndex * slideWidth;
                    currentTranslate = prevTranslate;
                    track.style.transform = `translateX(${currentTranslate}px)`;
                    
                    // Update UI
                    slides.forEach(slide => {
                        slide.classList.remove('visible-title');
                    });
                    slides[currentIndex].classList.add('visible-title');
                    
                    dots.forEach((dot, i) => {
                        if (i === currentIndex) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    });
                    updateRestartButton();
                });
            });
            
            // Suppress link click if the user was dragging
            track.addEventListener('click', function(e) {
                if (track.dataset.wasDragging) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            }, true);

            // Keyboard navigation
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (currentIndex < slideCount - 1) {
                        currentIndex++;
                    } else {
                        currentIndex = 0; // Loop back to start
                    }
                    
                    const slideWidth = slides[0].getBoundingClientRect().width;
                    prevTranslate = -currentIndex * slideWidth;
                    currentTranslate = prevTranslate;
                    track.style.transform = `translateX(${currentTranslate}px)`;
                    
                    // Update UI
                    slides.forEach(slide => {
                        slide.classList.remove('visible-title');
                    });
                    slides[currentIndex].classList.add('visible-title');
                    
                    dots.forEach((dot, i) => {
                        if (i === currentIndex) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    });
                }
            });
            
            // Handle window resize
            window.addEventListener('resize', function() {
                const slideWidth = slides[0].getBoundingClientRect().width;
                prevTranslate = -currentIndex * slideWidth;
                currentTranslate = prevTranslate;
                track.style.transform = `translateX(${currentTranslate}px)`;
            });
            
            // Initialize
            slides[0].classList.add('visible-title');
            
            const slideWidth = slides[0].getBoundingClientRect().width;
            prevTranslate = -currentIndex * slideWidth;
            currentTranslate = prevTranslate;
            setSliderPosition();
        });
    </script>
